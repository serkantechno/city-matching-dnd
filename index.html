<script>
    let draggedElement = null;
    let sourceDropZone = null;
    let offsetX = 0;
    let offsetY = 0;

    function addPlaceholder(dropZone) {
        dropZone.innerHTML = '<span class="placeholder">Drop city here</span>';
    }

    function resetDropZone(dropZone) {
        dropZone.classList.remove("correct", "wrong");
        dropZone.removeAttribute("data-status");
        addPlaceholder(dropZone);
    }

    function clearDropZone(dropZone) {
        dropZone.classList.remove("correct", "wrong");
        dropZone.removeAttribute("data-status");
        dropZone.innerHTML = "";
    }

    function resetCityStyle(cityElement) {
        cityElement.classList.remove("dragging");
        cityElement.style.left = "";
        cityElement.style.top = "";
        cityElement.style.position = "";
        cityElement.style.width = "";
        cityElement.style.height = "";
    }

    function returnCityToList(cityElement) {
        const citiesContainer = document.getElementById("cities-container");
        resetCityStyle(cityElement);
        citiesContainer.appendChild(cityElement);
    }

    function activateDragging(city, event) {
        draggedElement = city;
        sourceDropZone = city.closest(".drop-zone");

        // ÖNEMLİ: Koordinatı element DOM'dayken alıyoruz.
        const rect = city.getBoundingClientRect();

        offsetX = event.clientX - rect.left;
        offsetY = event.clientY - rect.top;

        city.style.width = rect.width + "px";
        city.style.height = rect.height + "px";
        city.style.left = rect.left + "px";
        city.style.top = rect.top + "px";

        city.classList.add("dragging");

        // appendChild elementi eski yerinden otomatik taşır.
        document.body.appendChild(city);

        // Eski drop-zone'u temizle.
        if (sourceDropZone) {
            resetDropZone(sourceDropZone);
        }
    }

    document.querySelectorAll(".city").forEach(city => {
        city.addEventListener("mousedown", function (event) {
            activateDragging(city, event);
        });
    });

    document.addEventListener("mousemove", function (event) {
        if (!draggedElement) return;

        draggedElement.style.left = (event.clientX - offsetX) + "px";
        draggedElement.style.top = (event.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", function (event) {
        if (!draggedElement) return;

        const dropTarget = document.elementFromPoint(event.clientX, event.clientY);
        const dropZone = dropTarget ? dropTarget.closest(".drop-zone") : null;

        if (dropZone) {
            const existingCity = dropZone.querySelector(".city");

            if (existingCity) {
                returnCityToList(existingCity);
            }

            clearDropZone(dropZone);
            resetCityStyle(draggedElement);
            dropZone.appendChild(draggedElement);

            const correctAnswer = dropZone.getAttribute("data-answer");
            const selectedCity = draggedElement.textContent.trim();

            if (correctAnswer === selectedCity) {
                dropZone.classList.add("correct");
                dropZone.setAttribute("data-status", "correct");
            } else {
                dropZone.classList.add("wrong");
                dropZone.setAttribute("data-status", "wrong");
            }
        } else {
            returnCityToList(draggedElement);
        }

        draggedElement = null;
        sourceDropZone = null;
    });
</script>
