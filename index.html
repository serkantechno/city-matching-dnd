<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>City Matching Drag Drop</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #555;
        }

        .wrapper {
            display: flex;
            justify-content: center;
            gap: 60px;
            align-items: flex-start;
        }

        .countries,
        .cities {
            width: 380px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            margin-top: 0;
        }

        .country-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .country-name {
            width: 130px;
            padding: 14px;
            background: #dbeafe;
            border: 1px solid #333;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }

        .drop-zone {
            width: 170px;
            min-height: 48px;
            padding: 8px;
            background: #e5e7eb;
            border: 2px dashed #777;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .city {
            padding: 14px;
            margin-bottom: 12px;
            background: white;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            cursor: grab;
            user-select: none;
        }

        .city.dragging {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.9;
            cursor: grabbing;
            width: 140px;
        }

        .correct {
            background: #16a34a;
            border-color: #166534;
        }

        .wrong {
            background: #dc2626;
            border-color: #991b1b;
        }

        .correct .city,
        .wrong .city {
            margin-bottom: 0;
            color: white;
            background: transparent;
            border: none;
        }
    </style>
</head>

<body>

<h1 id="page-title">City Matching Drag Drop</h1>
<p class="subtitle">Drag each city to the correct country.</p>

<div class="wrapper">

    <div class="countries">
        <h2>Countries</h2>

        <div class="country-row">
            <div class="country-name">Germany</div>
            <div class="drop-zone" id="country-germany" data-answer="Berlin"></div>
        </div>

        <div class="country-row">
            <div class="country-name">France</div>
            <div class="drop-zone" id="country-france" data-answer="Paris"></div>
        </div>

        <div class="country-row">
            <div class="country-name">Italy</div>
            <div class="drop-zone" id="country-italy" data-answer="Rome"></div>
        </div>

        <div class="country-row">
            <div class="country-name">Spain</div>
            <div class="drop-zone" id="country-spain" data-answer="Madrid"></div>
        </div>

        <div class="country-row">
            <div class="country-name">Türkiye</div>
            <div class="drop-zone" id="country-turkiye" data-answer="Ankara"></div>
        </div>
    </div>

    <div class="cities">
        <h2>Cities</h2>

        <div class="city" id="city-berlin">Berlin</div>
        <div class="city" id="city-paris">Paris</div>
        <div class="city" id="city-rome">Rome</div>
        <div class="city" id="city-madrid">Madrid</div>
        <div class="city" id="city-ankara">Ankara</div>
    </div>

</div>

<script>
    let draggedElement = null;
    let offsetX = 0;
    let offsetY = 0;

    document.querySelectorAll(".city").forEach(city => {
        city.addEventListener("mousedown", function (event) {
            draggedElement = city;

            const rect = city.getBoundingClientRect();
            offsetX = event.clientX - rect.left;
            offsetY = event.clientY - rect.top;

            city.classList.add("dragging");
            city.style.left = rect.left + "px";
            city.style.top = rect.top + "px";

            document.body.appendChild(city);
        });
    });

    document.addEventListener("mousemove", function (event) {
        if (!draggedElement) return;

        draggedElement.style.left = (event.clientX - offsetX) + "px";
        draggedElement.style.top = (event.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", function (event) {
        if (!draggedElement) return;

        draggedElement.classList.remove("dragging");

        const dropTarget = document.elementFromPoint(event.clientX, event.clientY);
        const dropZone = dropTarget ? dropTarget.closest(".drop-zone") : null;

        if (dropZone) {
            dropZone.innerHTML = "";
            dropZone.appendChild(draggedElement);

            const correctAnswer = dropZone.getAttribute("data-answer");
            const selectedCity = draggedElement.textContent.trim();

            dropZone.classList.remove("correct", "wrong");

            if (correctAnswer === selectedCity) {
                dropZone.classList.add("correct");
                dropZone.setAttribute("data-status", "correct");
            } else {
                dropZone.classList.add("wrong");
                dropZone.setAttribute("data-status", "wrong");
            }
        } else {
            document.querySelector(".cities").appendChild(draggedElement);
        }

        draggedElement.style.left = "";
        draggedElement.style.top = "";
        draggedElement.style.position = "";
        draggedElement.style.width = "";

        draggedElement = null;
    });
</script>

</body>
</html>
